<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual DM Screen Shell Base</title>
  <style>
    :root {
      --bg-0: #070b14;
      --bg-1: #0b1020;
      --bg-2: #0f1730;
      --panel-1: #121a2f;
      --panel-2: #18223d;
      --panel-3: #223158;
      --panel-4: #2b3d6b;
      --text: #e8edf8;
      --muted: #9fb0d3;
      --accent: #7aa2ff;
      --accent-2: #93c5fd;
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #22c55e;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.34);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --topbar-h: 46px;
      --subbar-h: 40px;
      --sidebar-w: 100px;
      --grid-size: 24px;
      --module-header-h: 34px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(122, 162, 255, 0.10), transparent 28%),
        linear-gradient(180deg, #0b1020, #090d18 55%, #070a12);
    }

    button, input, select, textarea { font: inherit; }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: var(--topbar-h) var(--subbar-h) 1fr;
      gap: 8px;
      padding: 8px;
    }

    .chrome-bar {
      display: grid;
      align-items: center;
      gap: 8px;
      min-height: 0;
      height: 100%;
      background: rgba(18, 26, 47, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 4px 8px;
      overflow: hidden;
    }

    .topbar {
      grid-template-columns: auto minmax(220px, 1fr) auto auto auto auto auto;
    }

    .subbar {
      grid-template-columns: 1fr auto auto auto;
    }

    .brand {
      display: inline-grid;
      align-items: center;
      justify-items: center;
      width: 42px;
      height: 42px;
      padding: 0;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      background: var(--panel-2);
      cursor: pointer;
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      pointer-events: none;
    }

    .screen-switcher,
    .toolbar-group,
    .status-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      min-height: 0;
      height: 100%;
    }

    .toolbar-group {
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      padding: 3px;
    }

    .toolbar-group label {
      color: var(--muted);
      font-size: 12px;
      padding-left: 6px;
      line-height: 1;
    }

    .tabs {
      display: flex;
      gap: 6px;
      align-items: center;
      overflow-x: auto;
      overflow-y: hidden;
      min-width: 0;
      min-height: 0;
      height: 100%;
      scrollbar-width: thin;
      padding: 0;
    }

    .tab {
      appearance: none;
      border: 1px solid rgba(255,255,255,.05);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      padding: 0 10px;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 0;
      height: 30px;
      line-height: 1;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
      flex: 0 0 auto;
    }

    .tab:hover,
    .btn:hover,
    .icon-btn:hover,
    .sidebar-card:hover { transform: translateY(-1px); }

    .tab.active {
      background: linear-gradient(180deg, rgba(122,162,255,.28), rgba(122,162,255,.12));
      border-color: rgba(122,162,255,.52);
    }

    .tab.system {
      border-style: dashed;
      color: var(--muted);
    }

    .tab-label {
      display: inline-block;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab-edit-input {
      width: 140px;
      height: 26px;
      min-height: 0;
      border-radius: 9px;
      padding: 0 8px;
      border: 1px solid rgba(122,162,255,.35);
      background: rgba(11,16,32,.95);
      color: var(--text);
      outline: none;
    }

    .module-title-edit-input {
      width: 100%;
      height: 22px;
      min-height: 0;
      border-radius: 7px;
      padding: 0 6px;
      border: 1px solid rgba(122,162,255,.35);
      background: rgba(11,16,32,.95);
      color: var(--text);
      outline: none;
      font-size: 13px;
      font-weight: 700;
    }

    .btn,
    .icon-btn,
    .chip,
    select,
    input[type="text"] {
      appearance: none;
      border: 1px solid rgba(255,255,255,.08);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
      min-height: 0;
    }

    .btn {
      border-radius: 12px;
      padding: 0 11px;
      cursor: pointer;
      height: 32px;
      line-height: 1;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .btn.primary {
      background: linear-gradient(180deg, rgba(122,162,255,.34), rgba(122,162,255,.14));
      border-color: rgba(122,162,255,.48);
    }

    .btn.danger-soft:hover {
      background: rgba(239,68,68,.14);
      border-color: rgba(239,68,68,.45);
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      cursor: pointer;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.05);
      line-height: 1;
      flex: 0 0 auto;
    }

    .chip {
      border-radius: 999px;
      padding: 0 9px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    select,
    input[type="text"] {
      border-radius: 10px;
      padding: 0 10px;
      height: 30px;
    }

    .shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      gap: 8px;
    }

    .main-stage,
    .sidebar {
      min-height: 0;
      background: rgba(18, 26, 47, 0.64);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
    }

    .main-stage {
      display: grid;
      grid-template-rows: 1fr;
    }

    .workspace {
      position: relative;
      min-height: 0;
      background-color: #0d1426;
      background-image:
        linear-gradient(to right, rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
    }

    .workspace.grid-off { background-image: none; }

    .sidebar {
      display: grid;
      grid-template-rows: 36px 1fr;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 6px 8px;
      background: linear-gradient(180deg, rgba(34,49,88,.95), rgba(24,34,61,.95));
      border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: 12px;
      color: var(--muted);
    }

    .sidebar-header-title {
      min-width: 0;
      flex: 1 1 auto;
      font-size: 11px;
      letter-spacing: .3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-header .icon-btn {
      flex: 0 0 auto;
    }

    .sidebar-list {
      padding: 8px;
      overflow: auto;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .sidebar-card {
      display: grid;
      gap: 6px;
      padding: 7px;
      border-radius: 14px;
      background: rgba(11,16,32,.94);
      border: 1px solid rgba(255,255,255,.07);
      cursor: grab;
      transition: transform .15s ease, border-color .15s ease, opacity .15s ease;
    }

    .sidebar-card.absent {
      opacity: .46;
      filter: grayscale(.2);
    }

    .sidebar-card.compact {
      justify-items: center;
      text-align: center;
    }

    .portrait {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      background:
        linear-gradient(45deg, #1f2937 25%, transparent 25%),
        linear-gradient(-45deg, #1f2937 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1f2937 75%),
        linear-gradient(-45deg, transparent 75%, #1f2937 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      border: 1px solid rgba(255,255,255,.05);
      overflow: hidden;
    }

    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .sidebar-meta {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .sidebar-headline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-width: 0;
    }

    .presence-toggle {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      border-radius: 999px;
      font-size: 10px;
      line-height: 1;
      padding: 4px 7px;
      cursor: pointer;
      white-space: nowrap;
    }

    .presence-toggle:hover {
      border-color: rgba(122,162,255,.52);
      color: var(--text);
    }

    .name {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .subline,
    .statsline {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-card.medium {
      grid-template-columns: 44px 1fr;
      align-items: center;
    }

    .sidebar-card.medium .portrait {
      width: 44px;
      height: 44px;
    }

    .sidebar-card.large {
      grid-template-columns: 48px 1fr;
      align-items: start;
    }

    .sidebar-card.large .portrait {
      width: 48px;
      height: 48px;
    }

    .character-context-menu {
      position: fixed;
      z-index: 5000;
      min-width: 170px;
      background: rgba(11, 16, 32, 0.98);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      box-shadow: 0 12px 24px rgba(0,0,0,.45);
      padding: 5px;
    }

    .character-context-menu[hidden] {
      display: none;
    }

    .character-context-menu-item {
      width: 100%;
      text-align: left;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 8px;
      cursor: pointer;
    }

    .character-context-menu-item:hover {
      background: rgba(122,162,255,.16);
      border-color: rgba(122,162,255,.34);
    }

    .rename-context-menu {
      position: fixed;
      z-index: 5000;
      min-width: 130px;
      background: rgba(11, 16, 32, 0.98);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      box-shadow: 0 12px 24px rgba(0,0,0,.45);
      padding: 5px;
    }

    .rename-context-menu[hidden] {
      display: none;
    }

    .rename-context-menu-item {
      width: 100%;
      text-align: left;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 8px;
      cursor: pointer;
    }

    .rename-context-menu-item:hover {
      background: rgba(122,162,255,.16);
      border-color: rgba(122,162,255,.34);
    }

    .app-logo-menu {
      position: fixed;
      z-index: 5000;
      min-width: 220px;
      background: rgba(11, 16, 32, 0.98);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      box-shadow: 0 12px 24px rgba(0,0,0,.45);
      padding: 5px;
    }

    .app-logo-menu[hidden] {
      display: none;
    }

    .app-logo-menu-item {
      width: 100%;
      text-align: left;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 8px;
      cursor: pointer;
    }

    .app-logo-menu-item:hover {
      background: rgba(122,162,255,.16);
      border-color: rgba(122,162,255,.34);
    }

    .module {
      position: absolute;
      min-width: 180px;
      min-height: 140px;
      display: grid;
      grid-template-rows: var(--module-header-h) 1fr;
      background: rgba(11, 16, 32, 0.94);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0,0,0,.4);
    }

    .module.dragging {
      opacity: .93;
      box-shadow: 0 18px 42px rgba(0,0,0,.52);
    }

    .module.interacting .module-body,
    .module.interacting .module-frame,
    .module.interacting .module-body * {
      pointer-events: none;
    }

    .module-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 8px 6px 10px;
      background: linear-gradient(180deg, rgba(34,49,88,.95), rgba(24,34,61,.95));
      border-bottom: 1px solid rgba(255,255,255,.06);
      cursor: move;
      user-select: none;
    }

    .module-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      flex: 1;
    }

    .module-actions {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .module-body {
      position: relative;
      background: #fff;
    }

    .module-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    .notes-editor {
      width: 100%;
      height: 100%;
      border: 0;
      resize: none;
      outline: none;
      padding: 10px 12px;
      background: #0d1426;
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
      overflow: auto;
    }

    .resize-handle {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      background:
        linear-gradient(135deg, transparent 0 50%, rgba(122,162,255,.6) 50% 60%, transparent 60% 70%, rgba(122,162,255,.6) 70% 80%, transparent 80% 100%);
      opacity: .9;
      z-index: 2;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 20px;
      pointer-events: none;
    }

    .empty-card {
      max-width: 460px;
      background: rgba(17, 24, 39, 0.55);
      border: 1px dashed rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 22px;
    }

    .empty-card h2 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .empty-card p {
      margin: 0;
      line-height: 1.45;
    }

    dialog {
      width: min(460px, calc(100vw - 24px));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      background: rgba(14, 19, 35, .98);
      color: var(--text);
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(0,0,0,.52);
      backdrop-filter: blur(4px);
    }

    .dialog-inner { padding: 18px; }
    .dialog-inner h3 { margin: 0 0 8px; }
    .dialog-inner p { margin: 0 0 14px; color: var(--muted); }
    .field { display: grid; gap: 7px; margin-bottom: 14px; }
    .field label { font-size: 13px; color: var(--muted); }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      margin-top: 6px;
    }

    .module-tile {
      appearance: none;
      border: 1px solid rgba(255,255,255,.08);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      min-height: 98px;
      padding: 10px 8px;
      display: grid;
      place-items: center;
      gap: 6px;
      text-align: center;
      transition: transform .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .module-tile:hover {
      transform: translateY(-1px);
      background: var(--panel-3);
    }

    .module-tile.selected {
      background: linear-gradient(180deg, rgba(122,162,255,.30), rgba(122,162,255,.12));
      border-color: rgba(122,162,255,.55);
      box-shadow: inset 0 0 0 1px rgba(122,162,255,.32);
    }

    .module-tile-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      padding: 4px;
    }

    .module-tile-name {
      font-size: 12px;
      line-height: 1.2;
      color: var(--text);
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 0 18px 18px;
    }

    .menu-anchor { position: relative; }

    .menu-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      min-width: 210px;
      background: rgba(14,19,35,.985);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 8px;
      display: none;
      z-index: 9999;
    }

    .menu-dropdown.open {
      display: grid;
      gap: 6px;
    }

    .menu-item {
      appearance: none;
      border: 1px solid rgba(255,255,255,.06);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 11px;
      text-align: left;
      cursor: pointer;
    }

    .menu-item:hover {
      background: var(--panel-3);
    }

    @media (max-width: 1240px) {
      .topbar {
        grid-template-columns: auto 1fr auto auto;
      }

      .topbar .toolbar-group.compact-hide {
        display: none;
      }

      .subbar {
        grid-template-columns: 1fr auto auto;
      }
    }

    @media (max-width: 960px) {
      .app {
        grid-template-rows: auto auto 1fr;
      }

      .topbar,
      .subbar {
        grid-template-columns: 1fr;
        height: auto;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="chrome-bar topbar">
      <button class="brand" id="logoMenuBtn" title="App" type="button">
        <img src="logo.svg" alt="App">
      </button>

      <div class="screen-switcher toolbar-group">
        <label for="screenSelect">Pantalla</label>
        <select id="screenSelect"></select>
        <button class="icon-btn" id="newScreenBtn" title="Nueva pantalla">＋</button>
      </div>

      <div class="toolbar-group">
        <label for="gridSize">Grilla</label>
        <select id="gridSize">
          <option value="0" selected>Off</option>
          <option value="8">8</option>
          <option value="12">12</option>
          <option value="16">16</option>
          <option value="24">24</option>
          <option value="32">32</option>
          <option value="48">48</option>
          <option value="64">64</option>
          <option value="96">96</option>
        </select>
      </div>

      <button class="btn" id="autoArrangeBtn">Ordenar</button>
      <button class="btn primary" id="addModuleBtn">+ Módulo</button>
    </div>

    <div class="chrome-bar subbar">
      <div class="tabs" id="panelTabs"></div>

      <button class="btn" id="addPanelBtn">+ Panel</button>
    </div>

    <div class="shell">
      <div class="main-stage">
        <div class="workspace grid-off" id="workspace"></div>
        <div class="empty-state" id="emptyState">
          <div class="empty-card">
            <h2>Virtual DM Screen</h2>
            <p>Agregá módulos a este panel o abrí el Archivo para restaurar elementos archivados.</p>
          </div>
        </div>
      </div>

      <aside class="sidebar" id="characterSidebar">
        <div class="sidebar-header">
          <span class="sidebar-header-title">PJs</span>
          <button class="icon-btn" id="toggleSidebarSizeBtn" title="Cambiar tamaño">⇄</button>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
      </aside>
    </div>
  </div>

  <div class="character-context-menu" id="characterContextMenu" hidden>
    <button class="character-context-menu-item" id="characterContextToggleBtn" type="button"></button>
  </div>

  <div class="rename-context-menu" id="renameContextMenu" hidden>
    <button class="rename-context-menu-item" id="renameContextActionBtn" type="button">Renombrar</button>
  </div>

  <div class="app-logo-menu" id="logoAppMenu" hidden>
    <button class="app-logo-menu-item" data-action="rename-screen" type="button">Renombrar pantalla actual</button>
    <button class="app-logo-menu-item" data-action="delete-screen" type="button">Eliminar pantalla actual</button>
    <button class="app-logo-menu-item" data-action="edit-modules" type="button">Editar módulos disponibles</button>
    <button class="app-logo-menu-item" data-action="export-screen" type="button">Exportar pantalla</button>
    <button class="app-logo-menu-item" data-action="import-screen" type="button">Importar pantalla</button>
  </div>

  <dialog id="moduleDialog">
    <div class="dialog-inner">
      <h3>Agregar módulo</h3>
      <p>Seleccioná el tipo de módulo que querés crear en el panel activo.</p>
      <div class="field">
        <label>Tipo de módulo</label>
        <div class="module-grid" id="moduleTypeGrid"></div>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn" id="cancelModuleBtn">Cancelar</button>
      <button class="btn primary" id="confirmModuleBtn">Agregar</button>
    </div>
  </dialog>

  <script>
    const appState = {
      activeScreenId: null,
      activePanelId: null,
      gridSize: 0,
      sidebarMode: 'compact',
      screens: [],
      panels: [],
      modules: [],
      moduleDefinitions: [],
      activeCharacters: [
        { id: 'ch-1', name: 'Aelar', raceClass: 'Elfo · Mago 5', stats: 'CA 14 · HP 27 · PP 15', absent: 0 },
        { id: 'ch-2', name: 'Branna', raceClass: 'Humana · Guerrera 4', stats: 'CA 17 · HP 41 · PP 11', absent: 0 },
        { id: 'ch-3', name: 'Dorrim', raceClass: 'Enano · Clérigo 4', stats: 'CA 18 · HP 35 · PP 14', absent: 1 }
      ]
    };

    const workspaceEl = document.getElementById('workspace');
    const emptyStateEl = document.getElementById('emptyState');
    const screenSelectEl = document.getElementById('screenSelect');
    const panelTabsEl = document.getElementById('panelTabs');
    const sidebarListEl = document.getElementById('sidebarList');
    const gridSizeEl = document.getElementById('gridSize');
    const moduleDialogEl = document.getElementById('moduleDialog');
    const moduleTypeGridEl = document.getElementById('moduleTypeGrid');
    const characterContextMenuEl = document.getElementById('characterContextMenu');
    const characterContextToggleBtnEl = document.getElementById('characterContextToggleBtn');
    const renameContextMenuEl = document.getElementById('renameContextMenu');
    const renameContextActionBtnEl = document.getElementById('renameContextActionBtn');
    const logoMenuBtnEl = document.getElementById('logoMenuBtn');
    const logoAppMenuEl = document.getElementById('logoAppMenu');
    let contextMenuCharacter = null;
    let selectedModuleTypeId = null;
    let editingPanelId = null;
    let editingModuleId = null;
    let renameContextTarget = null;
    const contentSaveTimers = new Map();

    function chooseInitialPanelId(screenId) {
      const panels = appState.panels.filter((p) => p.screen_id === screenId);
      const firstNonArchive = panels.find((p) => !p.is_archive);
      return (firstNonArchive || panels.find((p) => p.is_archive) || null)?.panel_id ?? null;
    }

    async function loadBootstrapData() {
      try {
        const response = await fetch('api/bootstrap.php', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();

        appState.screens = Array.isArray(payload.screens)
          ? payload.screens.map((screen) => ({
              screen_id: String(screen.id),
              name: screen.name || `Pantalla ${screen.id}`
            }))
          : [];

        appState.panels = Array.isArray(payload.panels)
          ? payload.panels.map((panel) => ({
              panel_id: String(panel.id),
              screen_id: String(panel.screen_id),
              name: panel.name || `Panel ${panel.id}`,
              is_archive: Number(panel.is_archive) ? 1 : 0
            }))
          : [];

        appState.modules = Array.isArray(payload.modules)
          ? payload.modules.map((mod) => ({
              module_id: String(mod.id),
              panel_id: String(mod.panel_id),
              module_type: mod.type,
              title: mod.title || mod.type,
              content: typeof mod.content === 'string' ? mod.content : '',
              x: Number(mod.position_x) || 0,
              y: Number(mod.position_y) || 0,
              width: Number(mod.width) || 320,
              height: Number(mod.height) || 220,
              is_archived: Number(mod.is_archived) ? 1 : 0
            }))
          : [];

        appState.moduleDefinitions = Array.isArray(payload.module_definitions)
          ? payload.module_definitions.map((def) => ({
              code: def.code,
              name: def.name || def.code,
              html: def.html_path || '',
              html_path: def.html_path || '',
              defaultW: Number(def.default_width) || 320,
              defaultH: Number(def.default_height) || 220,
              is_native: Number(def.is_native) ? 1 : 0
            }))
          : [];

        appState.activeScreenId = appState.screens[0]?.screen_id ?? null;
        appState.activePanelId = appState.activeScreenId
          ? chooseInitialPanelId(appState.activeScreenId)
          : null;
      } catch (error) {
        console.error('Failed to load bootstrap data from api/bootstrap.php', error);
      }
    }

    function getPanelsForActiveScreen() {
      return appState.panels.filter((p) => p.screen_id === appState.activeScreenId);
    }

    function getActivePanel() {
      return appState.panels.find((p) => p.panel_id === appState.activePanelId) || null;
    }

    function getModulesForActivePanel() {
      return appState.modules.filter((m) => m.panel_id === appState.activePanelId);
    }

    function getModuleDef(typeCode) {
      return appState.moduleDefinitions.find((m) => m.code === typeCode) || null;
    }

    function snap(value) {
      if (!appState.gridSize) return Math.round(value);
      return Math.round(value / appState.gridSize) * appState.gridSize;
    }

    function applyModuleRect(el, mod) {
      el.style.left = `${mod.x}px`;
      el.style.top = `${mod.y}px`;
      el.style.width = `${mod.width}px`;
      el.style.height = `${mod.height}px`;
    }

    function clampModuleToWorkspace(mod) {
      const maxX = Math.max(0, workspaceEl.clientWidth - mod.width);
      const maxY = Math.max(0, workspaceEl.clientHeight - mod.height);
      mod.x = Math.max(0, Math.min(mod.x, maxX));
      mod.y = Math.max(0, Math.min(mod.y, maxY));
    }

    function bringToFront(el) {
      const all = [...workspaceEl.querySelectorAll('.module')];
      const next = all.reduce((max, item) => Math.max(max, Number(item.style.zIndex || 1)), 1) + 1;
      el.style.zIndex = String(next);
    }

    async function saveModuleLayout(mod, moduleEl) {
      const moduleId = Number(mod.module_id);
      if (!Number.isFinite(moduleId)) {
        console.error('module_id inválido para guardar layout.', mod.module_id);
        return;
      }

      const payload = {
        module_id: moduleId,
        position_x: mod.x,
        position_y: mod.y,
        width: mod.width,
        height: mod.height,
        z_index: Number(moduleEl.style.zIndex) || 0
      };

      try {
        const response = await fetch('api/update_module_layout.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok || !result.success) {
          console.error('No se pudo guardar layout de módulo.', result);
        }
      } catch (error) {
        console.error('Error al guardar layout de módulo.', error);
      }
    }

    function scheduleModuleContentSave(mod, content) {
      mod.content = content;
      const existingTimer = contentSaveTimers.get(mod.module_id);
      if (existingTimer) {
        clearTimeout(existingTimer);
      }

      const timerId = setTimeout(async () => {
        contentSaveTimers.delete(mod.module_id);
        try {
          const response = await fetch('api/update_module_content.php', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              module_id: Number(mod.module_id),
              content: mod.content
            })
          });
          const result = await response.json();
          if (!response.ok || !result.success) {
            console.error('No se pudo guardar contenido del módulo.', result);
          }
        } catch (error) {
          console.error('Error al guardar contenido del módulo.', error);
        }
      }, 500);

      contentSaveTimers.set(mod.module_id, timerId);
    }

    function attachDrag(moduleEl, mod) {
      const header = moduleEl.querySelector('.module-header');
      header.addEventListener('pointerdown', (event) => {
        if (event.target.closest('.module-actions')) return;
        event.preventDefault();
        moduleEl.classList.add('dragging');
        moduleEl.classList.add('interacting');
        bringToFront(moduleEl);

        const rect = moduleEl.getBoundingClientRect();
        const workspaceRect = workspaceEl.getBoundingClientRect();
        const startOffsetX = event.clientX - rect.left;
        const startOffsetY = event.clientY - rect.top;

        const onMove = (e) => {
          mod.x = e.clientX - workspaceRect.left - startOffsetX;
          mod.y = e.clientY - workspaceRect.top - startOffsetY;
          if (appState.gridSize) {
            mod.x = snap(mod.x);
            mod.y = snap(mod.y);
          }
          clampModuleToWorkspace(mod);
          applyModuleRect(moduleEl, mod);
        };

        const onUp = () => {
          moduleEl.classList.remove('dragging');
          moduleEl.classList.remove('interacting');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          saveModuleLayout(mod, moduleEl);
        };

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });
    }

    function attachResize(moduleEl, mod) {
      const handle = moduleEl.querySelector('.resize-handle');
      handle.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        event.stopPropagation();
        moduleEl.classList.add('interacting');
        bringToFront(moduleEl);

        const startX = event.clientX;
        const startY = event.clientY;
        const startW = mod.width;
        const startH = mod.height;

        const onMove = (e) => {
          mod.width = Math.max(180, startW + (e.clientX - startX));
          mod.height = Math.max(140, startH + (e.clientY - startY));
          if (appState.gridSize) {
            mod.width = snap(mod.width);
            mod.height = snap(mod.height);
          }
          mod.width = Math.min(mod.width, workspaceEl.clientWidth - mod.x);
          mod.height = Math.min(mod.height, workspaceEl.clientHeight - mod.y);
          applyModuleRect(moduleEl, mod);
        };

        const onUp = () => {
          moduleEl.classList.remove('interacting');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          saveModuleLayout(mod, moduleEl);
        };

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
      });
    }

    function archiveModule(moduleId) {
      const activePanel = getActivePanel();
      if (!activePanel || activePanel.is_archive) return;
      const archivePanel = getPanelsForActiveScreen().find(p => p.is_archive);
      const mod = appState.modules.find(m => m.module_id === moduleId);
      if (!archivePanel || !mod) return;
      mod.panel_id = archivePanel.panel_id;
      mod.is_archived = 1;
      render();
      persistModuleArchive(moduleId, archivePanel.panel_id, 1);
    }

    function restoreModule(moduleId) {
      const activePanel = getActivePanel();
      if (!activePanel || !activePanel.is_archive) return;
      const restorePanel = getPanelsForActiveScreen().find(p => !p.is_archive);
      const mod = appState.modules.find(m => m.module_id === moduleId);
      if (!restorePanel || !mod) return;
      mod.panel_id = restorePanel.panel_id;
      mod.is_archived = 0;
      render();
      persistModuleArchive(moduleId, restorePanel.panel_id, 0);
    }

    async function persistModuleArchive(moduleId, panelId, isArchived) {
      const numericModuleId = Number(moduleId);
      const numericPanelId = Number(panelId);
      if (!Number.isFinite(numericModuleId) || !Number.isFinite(numericPanelId)) {
        console.error('IDs inválidos para persistir archivo de módulo.', { moduleId, panelId });
        return;
      }
      const payload = {
        module_id: numericModuleId,
        panel_id: numericPanelId,
        is_archived: isArchived
      };

      try {
        const response = await fetch('api/update_module_archive.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok || !result.success) {
          console.error('No se pudo persistir el estado de archivo del módulo.', result);
        }
      } catch (error) {
        console.error('Error al persistir archivo del módulo.', error);
      }
    }

    function deleteModule(moduleId) {
      const idx = appState.modules.findIndex(m => m.module_id === moduleId);
      if (idx >= 0) {
        appState.modules.splice(idx, 1);
        render();
      }
    }

    function deriveModuleIconPath(htmlPath) {
      if (!htmlPath) return '';
      const parts = htmlPath.split('/');
      if (parts.length <= 1) return 'icon.png';
      parts[parts.length - 1] = 'icon.png';
      return parts.join('/');
    }

    function setSelectedModuleType(typeCode) {
      selectedModuleTypeId = typeCode;
      moduleTypeGridEl.querySelectorAll('.module-tile').forEach((tile) => {
        tile.classList.toggle('selected', tile.dataset.type === typeCode);
      });
    }

    function openModuleDialog() {
      moduleTypeGridEl.innerHTML = '';
      appState.moduleDefinitions.forEach((item) => {
        const tile = document.createElement('button');
        tile.type = 'button';
        tile.className = 'module-tile';
        tile.dataset.type = item.code;
        tile.innerHTML = `
          <img class="module-tile-icon" src="${deriveModuleIconPath(item.html_path)}" alt="">
          <span class="module-tile-name">${item.name}</span>
        `;
        tile.addEventListener('click', () => setSelectedModuleType(item.code));
        moduleTypeGridEl.appendChild(tile);
      });
      const firstType = appState.moduleDefinitions[0]?.code ?? null;
      setSelectedModuleType(selectedModuleTypeId && getModuleDef(selectedModuleTypeId) ? selectedModuleTypeId : firstType);
      moduleDialogEl.showModal();
    }

    async function addModule(typeCode) {
      const def = getModuleDef(typeCode);
      const panel = getActivePanel();
      if (!def || !panel) return;
      const panelId = Number(panel.panel_id);
      if (!Number.isFinite(panelId)) {
        console.error('panel_id inválido para crear módulo.', panel.panel_id);
        return;
      }
      const count = getModulesForActivePanel().length;
      const offset = (count % 6) * 24;
      const payload = {
        panel_id: panelId,
        type: def.code,
        title: def.name,
        position_x: snap(20 + offset),
        position_y: snap(20 + offset),
        width: def.defaultW,
        height: def.defaultH
      };

      try {
        const response = await fetch('api/create_module.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (!response.ok || !result.success || !result.module) {
          console.error('No se pudo crear el módulo.', result);
          return;
        }

        const created = result.module;
        appState.modules.push({
          module_id: String(created.id),
          panel_id: String(created.panel_id),
          module_type: created.type,
          title: created.title || def.name,
          content: typeof created.content === 'string' ? created.content : '',
          x: Number(created.position_x) || 0,
          y: Number(created.position_y) || 0,
          width: Number(created.width) || def.defaultW,
          height: Number(created.height) || def.defaultH,
          is_archived: Number(created.is_archived) ? 1 : 0
        });
        render();
      } catch (error) {
        console.error('Error al crear módulo en backend.', error);
      }
    }

    function autoArrange() {
      const modules = getModulesForActivePanel();
      if (!modules.length) return;
      const gap = appState.gridSize || 16;
      const width = workspaceEl.clientWidth;
      let x = gap;
      let y = gap;
      let rowH = 0;

      modules.forEach((mod) => {
        if (x + mod.width > width - gap) {
          x = gap;
          y += rowH + gap;
          rowH = 0;
        }
        mod.x = appState.gridSize ? snap(x) : x;
        mod.y = appState.gridSize ? snap(y) : y;
        clampModuleToWorkspace(mod);
        x += mod.width + gap;
        rowH = Math.max(rowH, mod.height);
      });

      renderWorkspace();
    }

    function renderScreenSelect() {
      screenSelectEl.innerHTML = '';
      appState.screens.forEach((screen) => {
        const option = document.createElement('option');
        option.value = screen.screen_id;
        option.textContent = screen.name;
        option.selected = screen.screen_id === appState.activeScreenId;
        screenSelectEl.appendChild(option);
      });
    }

    function renderPanelTabs() {
      panelTabsEl.innerHTML = '';
      const panels = getPanelsForActiveScreen();
      panels.forEach((panel) => {
        const btn = document.createElement('button');
        btn.className = `tab ${panel.panel_id === appState.activePanelId ? 'active' : ''} ${panel.is_archive ? 'system' : ''}`;
        btn.innerHTML = `<span class="tab-label">${panel.name}</span>`;
        btn.addEventListener('click', () => {
          appState.activePanelId = panel.panel_id;
          render();
        });

        if (!panel.is_archive) {
          btn.addEventListener('contextmenu', (event) => {
            openRenameContextMenu(event, {
              type: 'panel',
              panelId: panel.panel_id,
              tabEl: btn
            });
          });
        }

        panelTabsEl.appendChild(btn);
      });
    }

    async function persistPanelName(panelId, name) {
      const response = await fetch('api/update_panel_name.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          panel_id: Number(panelId),
          name
        })
      });
      const result = await response.json();
      if (!response.ok || !result.success || !result.panel) {
        throw new Error('No se pudo persistir el nombre del panel.');
      }
      return result.panel;
    }

    async function persistModuleTitle(moduleId, title) {
      const response = await fetch('api/update_module_title.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          module_id: Number(moduleId),
          title
        })
      });
      const result = await response.json();
      if (!response.ok || !result.success || !result.module) {
        throw new Error('No se pudo persistir el título del módulo.');
      }
      return result.module;
    }

    function startPanelRename(panelId, tabEl) {
      if (editingPanelId && editingPanelId !== panelId) return;
      const panel = appState.panels.find((p) => p.panel_id === panelId);
      if (!panel) return;

      const currentLabel = tabEl.querySelector('.tab-label');
      if (!currentLabel) return;
      editingPanelId = panelId;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'tab-edit-input';
      input.value = panel.name;
      currentLabel.replaceWith(input);
      input.focus();
      input.select();
      const originalName = panel.name;
      let finished = false;

      const finish = async (commit) => {
        if (finished) return;
        finished = true;
        editingPanelId = null;
        if (!commit) {
          renderPanelTabs();
          return;
        }

        const nextName = input.value.trim();
        if (!nextName) {
          renderPanelTabs();
          return;
        }

        try {
          await persistPanelName(panelId, nextName);
          panel.name = nextName;
        } catch (error) {
          panel.name = originalName;
          console.error('Error al renombrar panel.', error);
        }
        renderPanelTabs();
      };

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          finish(true);
        }
        if (event.key === 'Escape') {
          event.preventDefault();
          finish(false);
        }
      });

      input.addEventListener('blur', () => finish(true));
    }

    function startModuleTitleRename(mod, moduleEl) {
      if (editingModuleId && editingModuleId !== mod.module_id) return;
      editingModuleId = mod.module_id;

      const titleEl = moduleEl.querySelector('.module-title');
      if (!titleEl) {
        editingModuleId = null;
        return;
      }

      const originalTitle = mod.title;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'module-title-edit-input';
      input.value = mod.title;
      titleEl.replaceWith(input);
      input.focus();
      input.select();
      let finished = false;

      const finish = async (commit) => {
        if (finished) return;
        finished = true;
        editingModuleId = null;
        if (!commit) {
          renderWorkspace();
          return;
        }

        const nextTitle = input.value.trim();
        if (!nextTitle) {
          renderWorkspace();
          return;
        }

        try {
          await persistModuleTitle(mod.module_id, nextTitle);
          mod.title = nextTitle;
        } catch (error) {
          mod.title = originalTitle;
          console.error('Error al renombrar módulo.', error);
        }
        renderWorkspace();
      };

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          finish(true);
        }
        if (event.key === 'Escape') {
          event.preventDefault();
          finish(false);
        }
      });

      input.addEventListener('blur', () => finish(true));
    }

    function renderSidebar() {
      sidebarListEl.innerHTML = '';
      appState.activeCharacters
        .slice()
        .sort((a, b) => Number(a.absent) - Number(b.absent))
        .forEach((ch) => {
          const card = document.createElement('div');
          card.className = `sidebar-card ${appState.sidebarMode} ${ch.absent ? 'absent' : ''}`;
          card.draggable = true;
          card.innerHTML = `
            <div class="portrait"></div>
            <div class="sidebar-meta">
              <div class="sidebar-headline">
                <div class="name">${ch.name}</div>
                <button class="presence-toggle" type="button">${ch.absent ? 'Ausente' : 'Activo'}</button>
              </div>
              <div class="subline">${ch.raceClass}</div>
              <div class="statsline">${ch.stats}</div>
            </div>
          `;
          card.querySelectorAll('.presence-toggle, .status-pill, .character-status-pill').forEach((el) => el.remove());
          card.addEventListener('contextmenu', (event) => openCharacterContextMenu(event, ch));

          if (appState.sidebarMode === 'compact') {
            card.querySelector('.subline').style.display = 'none';
            card.querySelector('.statsline').style.display = 'none';
          }
          if (appState.sidebarMode === 'medium') {
            card.querySelector('.statsline').style.display = 'none';
          }
          sidebarListEl.appendChild(card);
        });
    }

    function renderWorkspace() {
      workspaceEl.innerHTML = '';
      const modules = getModulesForActivePanel();
      emptyStateEl.style.display = modules.length ? 'none' : 'grid';

      if (appState.gridSize === 0) {
        workspaceEl.classList.add('grid-off');
      } else {
        workspaceEl.classList.remove('grid-off');
        workspaceEl.style.setProperty('--grid-size', `${appState.gridSize}px`);
      }

      modules.forEach((mod, index) => {
        const def = getModuleDef(mod.module_type);
        const activePanel = getActivePanel();
        const archiveActionLabel = activePanel && activePanel.is_archive ? 'Restaurar' : 'Archivar';
        const archiveActionIcon = activePanel && activePanel.is_archive ? '↩' : '🗄';
        const moduleEl = document.createElement('article');
        moduleEl.className = 'module';
        moduleEl.style.zIndex = String(index + 1);
        moduleEl.innerHTML = `
          <div class="module-header">
            <div class="module-title">${mod.title}</div>
            <div class="module-actions">
              <button class="icon-btn" title="${archiveActionLabel}">${archiveActionIcon}</button>
              <button class="icon-btn danger-soft" title="Cerrar">✕</button>
            </div>
          </div>
          <div class="module-body">
            ${mod.module_type === 'notes'
              ? `<textarea class="notes-editor" spellcheck="false"></textarea>`
              : `<iframe class="module-frame" src="${def && def.html_path ? def.html_path : 'about:blank'}?module_id=${encodeURIComponent(mod.module_id)}" title="${mod.title}"></iframe>`
            }
          </div>
          <div class="resize-handle" title="Cambiar tamaño"></div>
        `;

        if (mod.module_type === 'notes') {
          const notesTextarea = moduleEl.querySelector('.notes-editor');
          notesTextarea.value = mod.content || '';
          notesTextarea.addEventListener('input', () => scheduleModuleContentSave(mod, notesTextarea.value));
        }

        applyModuleRect(moduleEl, mod);
        attachDrag(moduleEl, mod);
        attachResize(moduleEl, mod);
        moduleEl.querySelector('.module-header').addEventListener('contextmenu', (event) => {
          openRenameContextMenu(event, {
            type: 'module',
            module: mod,
            moduleEl
          });
        });
        moduleEl.querySelectorAll('.icon-btn')[0].addEventListener('click', () => {
          if (activePanel && activePanel.is_archive) {
            restoreModule(mod.module_id);
            return;
          }
          archiveModule(mod.module_id);
        });
        moduleEl.querySelectorAll('.icon-btn')[1].addEventListener('click', () => deleteModule(mod.module_id));
        workspaceEl.appendChild(moduleEl);
      });
    }

    function render() {
      renderScreenSelect();
      renderPanelTabs();
      renderSidebar();
      renderWorkspace();
      gridSizeEl.value = String(appState.gridSize);
    }

    function closeCharacterContextMenu() {
      characterContextMenuEl.hidden = true;
      contextMenuCharacter = null;
    }

    function closeRenameContextMenu() {
      renameContextMenuEl.hidden = true;
      renameContextTarget = null;
    }

    function closeLogoAppMenu() {
      logoAppMenuEl.hidden = true;
    }

    function openLogoAppMenuFromEvent(event) {
      event.preventDefault();
      event.stopPropagation();
      closeCharacterContextMenu();
      closeRenameContextMenu();
      const rect = logoMenuBtnEl.getBoundingClientRect();
      logoAppMenuEl.hidden = false;
      logoAppMenuEl.style.left = `${rect.left}px`;
      logoAppMenuEl.style.top = `${rect.bottom + 8}px`;
    }

    function openRenameContextMenu(event, target) {
      event.preventDefault();
      event.stopPropagation();
      closeCharacterContextMenu();
      renameContextTarget = target;
      renameContextMenuEl.hidden = false;
      renameContextMenuEl.style.left = `${event.clientX}px`;
      renameContextMenuEl.style.top = `${event.clientY}px`;
    }

    function openCharacterContextMenu(event, character) {
      event.preventDefault();
      contextMenuCharacter = character;
      characterContextToggleBtnEl.textContent = 'Cambiar asistencia';
      characterContextMenuEl.hidden = false;

      const menuWidth = characterContextMenuEl.offsetWidth;
      const menuHeight = characterContextMenuEl.offsetHeight;
      const maxLeft = Math.max(0, window.innerWidth - menuWidth);
      const maxTop = Math.max(0, window.innerHeight - menuHeight);
      const clampedLeft = Math.min(Math.max(0, event.clientX), maxLeft);
      const clampedTop = Math.min(Math.max(0, event.clientY), maxTop);

      characterContextMenuEl.style.left = `${clampedLeft}px`;
      characterContextMenuEl.style.top = `${clampedTop}px`;
    }

    document.getElementById('addModuleBtn').addEventListener('click', openModuleDialog);
    document.getElementById('cancelModuleBtn').addEventListener('click', () => moduleDialogEl.close());
    document.getElementById('confirmModuleBtn').addEventListener('click', () => {
      const fallbackType = appState.moduleDefinitions[0]?.code ?? null;
      addModule(selectedModuleTypeId || fallbackType);
      moduleDialogEl.close();
    });

    document.getElementById('autoArrangeBtn').addEventListener('click', autoArrange);

    document.getElementById('addPanelBtn').addEventListener('click', async () => {
      if (!appState.activeScreenId) return;
      const screenId = Number(appState.activeScreenId);
      if (!Number.isFinite(screenId)) {
        console.error('screen_id inválido para crear panel.', appState.activeScreenId);
        return;
      }
      const next = appState.panels.filter(p => p.screen_id === appState.activeScreenId && !p.is_archive).length + 1;
      const payload = {
        screen_id: screenId,
        name: `Panel ${next}`
      };

      try {
        const response = await fetch('api/create_panel.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (!response.ok || !result.success || !result.panel) {
          console.error('No se pudo crear el panel.', result);
          return;
        }

        const panel = result.panel;
        appState.panels.push({
          panel_id: String(panel.id),
          screen_id: String(panel.screen_id),
          name: panel.name || payload.name,
          sort_order: Number(panel.sort_order) || 0,
          is_archive: Number(panel.is_archive) ? 1 : 0
        });
        appState.activePanelId = String(panel.id);
        render();
      } catch (error) {
        console.error('Error al crear panel en backend.', error);
      }
    });

    document.getElementById('newScreenBtn').addEventListener('click', async () => {
      const suggestedName = `Pantalla ${appState.screens.length + 1}`;
      const inputName = window.prompt('Nombre de la nueva pantalla:', suggestedName);
      const nextName = inputName ? inputName.trim() : '';
      if (!nextName) return;
      const payload = { name: nextName };

      try {
        const response = await fetch('api/create_screen.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (!response.ok || !result.success || !result.screen || !Array.isArray(result.panels)) {
          console.error('No se pudo crear la pantalla.', result);
          return;
        }

        const screen = result.screen;
        appState.screens.push({
          screen_id: String(screen.id),
          name: screen.name || payload.name
        });

        result.panels.forEach((panel) => {
          appState.panels.push({
            panel_id: String(panel.id),
            screen_id: String(panel.screen_id),
            name: panel.name || 'Panel',
            sort_order: Number(panel.sort_order) || 0,
            is_archive: Number(panel.is_archive) ? 1 : 0
          });
        });

        appState.activeScreenId = String(screen.id);
        appState.activePanelId = chooseInitialPanelId(appState.activeScreenId);
        render();
      } catch (error) {
        console.error('Error al crear pantalla en backend.', error);
      }
    });

    function deleteActiveScreen() {
      if (appState.screens.length <= 1 || !appState.activeScreenId) return;
      const currentId = appState.activeScreenId;
      appState.modules = appState.modules.filter(m => !appState.panels.some(p => p.panel_id === m.panel_id && p.screen_id === currentId));
      appState.panels = appState.panels.filter(p => p.screen_id !== currentId);
      appState.screens = appState.screens.filter(s => s.screen_id !== currentId);
      appState.activeScreenId = appState.screens[0]?.screen_id ?? null;
      appState.activePanelId = appState.activeScreenId ? chooseInitialPanelId(appState.activeScreenId) : null;
      render();
    }

    screenSelectEl.addEventListener('change', () => {
      appState.activeScreenId = screenSelectEl.value;
      appState.activePanelId = chooseInitialPanelId(appState.activeScreenId);
      render();
    });

    gridSizeEl.addEventListener('change', () => {
      appState.gridSize = Number(gridSizeEl.value);
      renderWorkspace();
    });

    document.getElementById('toggleSidebarSizeBtn').addEventListener('click', () => {
      appState.sidebarMode = appState.sidebarMode === 'compact'
        ? 'medium'
        : appState.sidebarMode === 'medium'
          ? 'large'
          : 'compact';

      document.documentElement.style.setProperty('--sidebar-w', appState.sidebarMode === 'compact' ? '100px' : appState.sidebarMode === 'medium' ? '220px' : '290px');
      renderSidebar();
    });

    characterContextToggleBtnEl.addEventListener('click', () => {
      if (!contextMenuCharacter) return;
      contextMenuCharacter.absent = contextMenuCharacter.absent ? 0 : 1;
      closeCharacterContextMenu();
      renderSidebar();
    });

    renameContextActionBtnEl.addEventListener('click', () => {
      if (!renameContextTarget) return;
      if (renameContextTarget.type === 'panel') {
        startPanelRename(renameContextTarget.panelId, renameContextTarget.tabEl);
      }
      if (renameContextTarget.type === 'module') {
        startModuleTitleRename(renameContextTarget.module, renameContextTarget.moduleEl);
      }
      closeRenameContextMenu();
    });

    logoMenuBtnEl.addEventListener('click', openLogoAppMenuFromEvent);
    logoMenuBtnEl.addEventListener('contextmenu', openLogoAppMenuFromEvent);

    logoAppMenuEl.addEventListener('click', (event) => {
      const menuItem = event.target.closest('.app-logo-menu-item');
      if (!menuItem) return;
      const action = menuItem.dataset.action;

      if (action === 'rename-screen') {
        const activeScreen = appState.screens.find((s) => s.screen_id === appState.activeScreenId);
        if (activeScreen) {
          const inputName = window.prompt('Nuevo nombre de la pantalla actual:', activeScreen.name);
          const nextName = inputName ? inputName.trim() : '';
          if (nextName) {
            activeScreen.name = nextName;
            renderScreenSelect();
          }
        }
      }

      if (action === 'delete-screen') {
        const firstConfirm = window.confirm('¿Seguro que querés eliminar la pantalla actual?');
        if (firstConfirm) {
          const secondConfirm = window.confirm('Esta acción eliminará TODO lo que hay dentro de la pantalla actual. ¿Continuar?');
          if (secondConfirm) {
            deleteActiveScreen();
          }
        }
      }

      if (action === 'edit-modules') {
        console.info('TODO: editar módulos disponibles.');
      }
      if (action === 'export-screen') {
        console.info('TODO: exportar pantalla.');
      }
      if (action === 'import-screen') {
        console.info('TODO: importar pantalla.');
      }

      closeLogoAppMenu();
    });

    document.addEventListener('click', () => {
      closeCharacterContextMenu();
      closeRenameContextMenu();
      closeLogoAppMenu();
    });

    document.addEventListener('contextmenu', (event) => {
      if (!event.target.closest('.sidebar-card')) {
        closeCharacterContextMenu();
      }
      if (!event.target.closest('.rename-context-menu')) {
        closeRenameContextMenu();
      }
      if (!event.target.closest('.app-logo-menu') && !event.target.closest('#logoMenuBtn')) {
        closeLogoAppMenu();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeRenameContextMenu();
        closeLogoAppMenu();
      }
    });

    window.addEventListener('resize', () => {
      getModulesForActivePanel().forEach((mod) => clampModuleToWorkspace(mod));
      renderWorkspace();
    });

    loadBootstrapData().finally(render);
  </script>
</body>
</html>
